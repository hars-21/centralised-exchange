services:
  backend:
    build:
      target: dev
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

  engine:
    build:
      target: dev
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./engine:/usr/src/app
      - /usr/src/app/node_modules

  worker:
    build:
      target: dev
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./worker:/usr/src/app
      - /usr/src/app/node_modules

  postgres:
    ports:
      - 5432:5432
