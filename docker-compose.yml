services:
  backend:
    build: ./backend
    ports:
      - 8000:8000

    env_file:
      - ./backend/.env

    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - 3000:3000

    env_file:
      - ./frontend/.env

    depends_on:
      - backend

  engine:
    build: ./engine
    env_file:
      - ./engine/.env

    depends_on:
      - redis

  worker:
    build: ./worker
    env_file:
      - ./worker/.env

    depends_on:
      - postgres
      - redis

  postgres:
    image: timescale/timescaledb:latest-pg17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=exchange

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

volumes:
  postgres_data:
